aid: harbor
name: Harbor
description: >-
  Harbor is a no-code tool that lets brands build an owned community platform
  where superfans can engage with the brand and earn rewards. Harbor enables
  businesses to create superfan strategies through customizable community
  platforms with engagement and loyalty features.
